{% extends "base.html" %}

{% block title %}Register - CropCare Assistant{% endblock %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2><i class="fas fa-user-plus"></i> Create Account</h2>
        <p style="text-align: center; color: #666; margin-bottom: 2rem;">Join CropCare Assistant to access all farming solutions</p>
        
        <form method="POST">
            <div class="form-group">
                <label for="username"><i class="fas fa-user"></i> Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="email"><i class="fas fa-envelope"></i> Email</label>
                <input type="email" id="email" name="email" required>
            </div>
            
            <div class="form-group">
                <label for="mobile"><i class="fas fa-phone"></i> Mobile Number</label>
                <input type="tel" id="mobile" name="mobile" pattern="[0-9]{10}" placeholder="Enter 10-digit mobile number" required>
                <small style="color: #666; font-size: 0.8rem;">Enter a valid 10-digit mobile number (e.g., 9876543210)</small>
            </div>
            
            <div class="form-group">
                <label for="password"><i class="fas fa-lock"></i> Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <div class="form-group">
                <label for="user_type"><i class="fas fa-user-tag"></i> I am a</label>
                <select id="user_type" name="user_type">
                    <option value="farmer">Farmer/Grower</option>
                    <option value="buyer">Buyer/Trader</option>
                </select>
            </div>
            
            <div class="form-group">
                <label for="location"><i class="fas fa-map-marker-alt"></i> Location (Optional)</label>
                <input type="text" id="location" name="location" placeholder="City, State">
            </div>
            
            <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">
                <i class="fas fa-user-plus"></i> Create Account
            </button>
        </form>
        
        <p class="auth-link">
            Already have an account? <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
